  <script>
  /* UX Guard: Monetag vignette(ekhay zone 11297409) 차단 — InPage Push·팝언더 수익은 유지 */
  (function () {
    function sweep() {
      document.querySelectorAll('iframe').forEach(function (f) {
        try {
          var s = f.src || '';
          if (s.indexOf('ekhay') !== -1 || s.indexOf('vignette') !== -1) {
            var p = f.parentElement;
            f.remove();
            if (p && p !== document.body && p.childElementCount === 0) p.remove();
          }
        } catch (e) {}
      });
      document.querySelectorAll('div').forEach(function (d) {
        if (d.id === 'ad-overlay') return;
        try {
          var cs = window.getComputedStyle(d);
          if (cs.position === 'fixed' && parseInt(cs.zIndex) > 99990 && d.querySelector('iframe')) {
            d.remove();
          }
        } catch (e) {}
      });
    }
    var obs = new MutationObserver(sweep);
    function start() {
      obs.observe(document.body, { childList: true, subtree: true });
      var n = 0;
      (function tick() { sweep(); if (++n < 20) setTimeout(tick, 500); })();
    }
    document.body ? start() : document.addEventListener('DOMContentLoaded', start);
  })();

  ──────────────────────────────────────────────────────── -->
  <script>
    (function () {
      function patchSocialBarOverlay() {
        document.querySelectorAll('a').forEach(function (a) {
          var cs = getComputedStyle(a);
          if (cs.position === 'fixed' &&
              parseFloat(cs.width)  > window.innerWidth  * 0.5 &&
              parseFloat(cs.height) > window.innerHeight * 0.3) {
            a.style.setProperty('pointer-events', 'none', 'important');
          }
        });
      }
      setTimeout(patchSocialBarOverlay, 600);
      setInterval(patchSocialBarOverlay, 2000);
    })();

  <script>
/* ====================================================
 * 핵심 공용 엔진 (자동 생성 - 수정하지 마세요)

 * ==================================================== */
// ============================================================
// core.js — 글로벌 수익 자판기 핵심 공용 엔진
// ============================================================
// 이 파일은 인도/인도네시아 두 스킨이 100% 공유하는 유일한 로직 레이어입니다.
// 광고 제어, 무한 랜덤 연산, WhatsApp 공유 배선을 담당합니다.

/**
 * [랜덤 선택기]
 * 배열에서 매번 다른 요소를 반환합니다.
 * 배열 크기를 늘릴수록 조합 수가 폭발적으로 증가 → "무한 랜덤성" 구현의 핵심
 *
 * @param {Array} arr - 무작위로 선택할 배열
 * @returns {*} 배열에서 랜덤하게 선택된 요소 1개
 */
function pickRandom(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

/**
 * [무한 랜덤 결과 생성기]
 * config.resultPools 객체의 각 키(luckyNumber, vedicCard 등)에 대해
 * 각각 독립적으로 랜덤 선택을 수행하여 완성된 결과 객체를 조립합니다.
 * 예: 9가지 카드 × 13가지 숫자 × 6가지 색상 = 702가지 조합
 *
 * @param {Object} config - 국가별 APP_CONFIG 설정 객체 (window.APP_CONFIG)
 * @returns {Object} 각 풀에서 선택된 값들로 구성된 결과 객체
 */
function generateRandomResult(config) {
  const result = {};
  // resultPools의 각 키-배열 쌍을 순회하며 독립 랜덤 선택
  for (const [key, pool] of Object.entries(config.resultPools)) {
    result[key] = pickRandom(pool);
  }
  return result;
}

/**
 * [광고 인터스티셜 컨트롤러]
 * 유저가 결과 보기 버튼을 누를 때 이 함수가 호출됩니다.
 * Adsterra 광고가 로드되면 → 광고 표시 → 닫힘 시 결과창 이동
 * Adsterra 광고 차단/로드실패 → 3초 폴백 타이머 후 결과창 강제 이동
 *
 * ★ 실제 Adsterra 계정 설정 방법:
 *    1. Adsterra 대시보드(adsterra.com)에서 'Pop-under' 또는 'Interstitial' 광고 코드 발급
 *    2. templates/index.html의 <!-- AD_PLACEHOLDER --> 주석을
 *       발급받은 <script> 코드 전체로 교체하면 자동 작동합니다.
 *    3. Adsterra 팝언더는 페이지 로드 후 첫 번째 유저 클릭 시 자동 발동되므로
 *       버튼 클릭이 곧 광고 트리거 시점이 됩니다.
 *
 * @param {Function} onComplete - 광고 종료 또는 3초 타임아웃 후 실행할 콜백 함수
 */
function showInterstitialAd(onComplete) {
  // 콜백이 두 번 실행되는 것을 방지하는 플래그
  let callbackFired = false;

  function fireCallback() {
    if (callbackFired) return; // 이미 실행됐으면 두 번째 호출 무시
    callbackFired = true;
    // 화면에 오버레이가 남아있으면 제거
    const overlay = document.getElementById('ad-overlay');
    if (overlay) {
      overlay.style.opacity = '0';
      overlay.style.transition = 'opacity 0.3s ease';
      setTimeout(function () { if (overlay.parentNode) overlay.remove(); }, 300);
    }
    onComplete(); // 결과창 렌더링 시작
  }

  // ── 3초 폴백 타이머 ──────────────────────────────────────
  // AdBlock 사용자, 광고 네트워크 오류, 느린 네트워크 모두 커버
  // 어떤 상황에서도 유저가 결과 화면으로 반드시 이동하도록 보장
  const fallbackTimer = setTimeout(fireCallback, 3000);

  // ── 광고 대기 오버레이 DOM 생성 ──────────────────────────
  // 유저에게 "잠깐 기다려 주세요" 피드백을 주는 반투명 풀스크린 레이어
  // 실제 Adsterra 팝언더 광고는 백그라운드 탭에서 열리므로
  // 이 오버레이가 메인 화면의 시각적 피드백을 담당합니다
  const overlay = document.createElement('div');
  overlay.id = 'ad-overlay';
  overlay.setAttribute('style', [
    'position:fixed', 'top:0', 'left:0', 'right:0', 'bottom:0',
    'z-index:9999',
    'background:rgba(0,0,0,0.80)',
    'display:flex',
    'flex-direction:column',
    'align-items:center',
    'justify-content:center',
    'backdrop-filter:blur(6px)',
    '-webkit-backdrop-filter:blur(6px)',
    'opacity:0',
    'transition:opacity 0.3s ease'
  ].join(';'));

  // 오버레이 내부 카드 (국가 스킨에 무관하게 중립적인 디자인)
  overlay.innerHTML = [
    '<div style="',
    'background:white;',
    'border-radius:24px;',
    'padding:32px 24px;',
    'max-width:320px;',
    'width:88%;',
    'text-align:center;',
    'box-shadow:0 30px 60px rgba(0,0,0,0.4);',
    '">',
    // 스피너 이모지 (JS가 애니메이션 처리)
    '<div id="ad-spinner" style="font-size:52px;margin-bottom:16px;">⏳</div>',
    '<p style="font-size:17px;font-weight:900;color:#222;margin:0 0 6px;">Please wait...</p>',
    '<p style="font-size:13px;color:#888;margin:0 0 20px;">Your result is almost ready ✨</p>',
    // 프로그레스 바 트랙
    '<div style="background:#f0f0f0;border-radius:99px;height:10px;overflow:hidden;margin-bottom:12px;">',
    '<div id="ad-progress" style="',
    'height:100%;',
    'width:0%;',
    'background:linear-gradient(90deg,#f97316,#eab308);',
    'border-radius:99px;',
    'transition:width 0.1s linear;',
    '"></div>',
    '</div>',
    // 광고 레이블
    '<p style="font-size:10px;color:#ccc;margin:0;">Sponsored · Advertisement</p>',
    // 실제 Adsterra 배너 광고를 여기에 삽입할 수도 있습니다
    '<div id="ad-banner-slot" style="margin-top:12px;min-height:60px;"></div>',
    '</div>'
  ].join('');

  document.body.appendChild(overlay);

  // 페이드인 (requestAnimationFrame으로 CSS transition 트리거)
  requestAnimationFrame(function () {
    requestAnimationFrame(function () {
      overlay.style.opacity = '1';
    });
  });

  // ── 프로그레스 바 & 스피너 애니메이션 ────────────────────
  // 3초(3000ms) 동안 0% → 100% 채우기
  let progress = 0;
  const progressEl = document.getElementById('ad-progress');
  const spinnerEl = document.getElementById('ad-spinner');
  const spinnerFrames = ['⏳', '⌛', '⏳', '⌛'];
  let spinnerIdx = 0;

  const progressInterval = setInterval(function () {
    progress += 100 / 30; // 100ms 간격 × 30회 = 3000ms
    if (progressEl) progressEl.style.width = Math.min(progress, 100) + '%';
    spinnerIdx = (spinnerIdx + 1) % spinnerFrames.length;
    if (spinnerEl) spinnerEl.textContent = spinnerFrames[spinnerIdx];
    if (progress >= 100) clearInterval(progressInterval);
  }, 100);

  // ── Adsterra 실제 광고 API 연동 (선택 사항) ───────────────
  // Adsterra 스크립트가 페이지에 로드된 경우 공식 닫힘 이벤트를 수신합니다.
  // 스크립트가 없거나 함수가 없으면 try/catch가 무시하고 fallbackTimer에 위임합니다.
  try {
    if (typeof window.__adsterra_show === 'function') {
      window.__adsterra_show({
        onClose: function () {
          clearTimeout(fallbackTimer);
          clearInterval(progressInterval);
          fireCallback();
        }
      });
    }
    // ★ Adsterra 팝언더 방식(가장 일반적):
    //   유저의 첫 클릭 이벤트에서 자동으로 백그라운드 탭이 열립니다.
    //   AD_PLACEHOLDER에 Adsterra 스크립트를 삽입하면 별도 API 호출 없이 자동 작동합니다.
  } catch (e) {
    // 광고 트리거 오류 → fallbackTimer(3초)에 위임하여 유저 이탈 방지
    console.warn('[AdManager] 광고 트리거 실패, 3초 폴백 타이머 사용 중.', e.message);
  }
}

/**
 * [날짜 시드 선택기] — 기능 1: 오늘의 럭키 아이템
 * 오늘 날짜를 seed로 사용해서 배열에서 하나를 일관되게 반환합니다.
 * 같은 날은 누구나 같은 항목 → 매일 자정마다 자동 갱신 → 재방문 유도
 */
function getDailyItem(arr) {
  var d = new Date();
  var seed = d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
  return arr[seed % arr.length];
}

/**
 * [주간 트렌드 선택기] — 기능 4: 주간 K-트렌드 배너
 * 이번 주차(ISO week number)를 seed로 매주 자동 교체되는 트렌드를 반환합니다.
 */
function getWeeklyTrend(arr) {
  var d = new Date();
  var startOfYear = new Date(d.getFullYear(), 0, 1);
  var week = Math.floor((d - startOfYear) / (7 * 24 * 60 * 60 * 1000));
  return arr[week % arr.length];
}

/**
 * [일일 방문자 카운터] — 기능 5: 사회적 증거 UI
 * 날짜와 시간(0-23h)을 seed로 결정론적 숫자를 생성합니다.
 * 시간이 지날수록 숫자가 자연스럽게 증가하는 것처럼 보입니다.
 * @param {number} base - 기본 방문자 수 (예: 8000)
 * @param {number} variance - 변동 폭 (예: 5000 → 8000~12999 범위)
 */
function getDailyVisitorCount(base, variance) {
  var d = new Date();
  var seed = d.getFullYear() * 1000000 + (d.getMonth() + 1) * 10000 + d.getDate() * 100 + d.getHours();
  var hash = ((seed * 2654435761) >>> 0);
  var count = base + (hash % variance);
  return count.toLocaleString();
}

/**
 * [별자리 가중 결과 생성기] — 기능 3: 별자리 선택 맞춤형 결과
 * zodiacIndex(0-11)를 오프셋으로 더해 별자리마다 다른 결과 분포를 만듭니다.
 * 실제로는 랜덤이지만 유저에게 "나만의 맞춤 결과" 느낌을 줍니다.
 */
function generateZodiacResult(config, zodiacIndex) {
  var result = {};
  for (var key in config.resultPools) {
    var pool = config.resultPools[key];
    var baseIdx = Math.floor(Math.random() * pool.length);
    var idx = (baseIdx + (zodiacIndex || 0)) % pool.length;
    result[key] = pool[idx];
  }
  return result;
}

/**
 * [SNS 공유 버튼 그리드 렌더러]
 * config.socialOrder 배열 순서대로 SNS 아이콘 버튼을 생성합니다.
 * @param {Object} config - 국가별 APP_CONFIG
 * @returns {string} SNS 공유 버튼 그리드 HTML
 */
function renderSocialShareButtons(config) {
  var order = (config.socialOrder && config.socialOrder.length)
    ? config.socialOrder
    : ['whatsapp', 'facebook', 'twitter', 'telegram'];

  var buttons = order.map(function(key) {
    var p = SOCIAL_PLATFORMS[key];
    if (!p) return '';
    var copyLabel = p.copyOnly ? ' title="링크 복사"' : '';
    return [
      '<button onclick="window._shareOn(\'' + key + '\')"',
      copyLabel,
      ' style="display:flex;flex-direction:column;align-items:center;gap:5px;',
      'background:none;border:none;cursor:pointer;padding:6px 2px;min-width:52px;">',
      '<div style="width:48px;height:48px;border-radius:50%;background:', p.color, ';',
      'display:flex;align-items:center;justify-content:center;',
      'box-shadow:0 3px 10px rgba(0,0,0,0.18);',
      'transition:transform 0.15s,box-shadow 0.15s;" ',
      'onmousedown="this.style.transform=\'scale(0.88)\'" ',
      'onmouseup="this.style.transform=\'scale(1)\'" ',
      'ontouchstart="this.style.transform=\'scale(0.88)\'" ',
      'ontouchend="this.style.transform=\'scale(1)\'">',
      '<svg viewBox="0 0 24 24" fill="white" width="22" height="22">', p.svgPath, '</svg>',
      '</div>',
      '<span style="font-size:9px;font-weight:800;color:#666;white-space:nowrap;letter-spacing:-0.2px;">', p.name, '</span>',
      '</button>'
    ].join('');
  }).join('');

  return [
    '<div style="display:flex;flex-wrap:wrap;justify-content:center;gap:8px;padding:4px 0;">',
    buttons,
    '</div>'
  ].join('');
}

/**
 * [클립보드 복사 토스트 알림]
 * Instagram·TikTok 등 직접 공유 API가 없는 플랫폼 사용 시 링크 복사 후 표시합니다.
 */
function showCopyToast(platformName) {
  var existing = document.getElementById('share-toast');
  if (existing) existing.remove();

  var toast = document.createElement('div');
  toast.id = 'share-toast';
  toast.textContent = '📋 Link copied! Paste into ' + platformName;
  toast.setAttribute('style', [
    'position:fixed;bottom:36px;left:50%;transform:translateX(-50%);',
    'background:#1a1a1a;color:white;padding:11px 22px;border-radius:24px;',
    'font-size:13px;font-weight:700;z-index:99999;white-space:nowrap;',
    'box-shadow:0 6px 20px rgba(0,0,0,0.35);',
    'opacity:0;transition:opacity 0.25s ease;'
  ].join(''));
  document.body.appendChild(toast);
  requestAnimationFrame(function() {
    requestAnimationFrame(function() { toast.style.opacity = '1'; });
  });
  setTimeout(function() {
    toast.style.opacity = '0';
    setTimeout(function() { if (toast.parentNode) toast.remove(); }, 300);
  }, 2800);
}

/**
 * [WhatsApp 공유 URL 생성기]
 * 현재 도메인 URL + 국가별 현지어 바이럴 문구를 합쳐
 * WhatsApp 딥링크 URL을 만듭니다.
 *
 * @param {Object} config - 국가별 APP_CONFIG (config.getShareText 함수 필요)
 * @param {Object} result - generateRandomResult()가 반환한 결과 객체
 * @returns {string} 완성된 WhatsApp 공유 URL
 */
function generateWhatsAppShareUrl(config, result) {
  const shareText = config.getShareText(result);
  const fullText = shareText + '\n\n👉 ' + window.location.href;
  return 'https://api.whatsapp.com/send?text=' + encodeURIComponent(fullText);
}

/**
 * [WhatsApp 공유 실행기] — 하위 호환성 유지용
 */
function openWhatsAppShare(config, result) {
  const url = generateWhatsAppShareUrl(config, result);
  window.open(url, '_blank', 'noopener,noreferrer');
}

       * copyOnly 플랫폼(Instagram, TikTok 등)은 클립보드 복사 후 토스트 표시
       * 나머지는 해당 플랫폼 공유 URL을 새 탭으로 열기
       */
      window._shareOn = function (platform) {
        if (!currentResult) return;
        var p = SOCIAL_PLATFORMS[platform];
        if (!p) return;
        var shareText = cfg.getShareText(currentResult);
        var shareUrl = window.location.href;

        if (p.copyOnly) {
          var fullText = shareText + '\n\n👉 ' + shareUrl;
          try {
            navigator.clipboard.writeText(fullText).then(function () {
              showCopyToast(p.name);
            }).catch(function () {
              fallbackCopy(fullText, p.name);
            });
          } catch (e) {
            fallbackCopy(fullText, p.name);
          }
        } else {
          var url = p.getUrl(shareText, shareUrl);
          window.open(url, '_blank', 'noopener,noreferrer');
        }
      };

        var ta = document.createElement('textarea');
        ta.value = text;
        ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;';
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        try { document.execCommand('copy'); } catch (e) {}
        document.body.removeChild(ta);
        showCopyToast(platformName);
      }

      // 하위 호환성: WhatsApp 직접 공유
      window._handleShare = function () {
        window._shareOn('whatsapp');
      };

      /**
       * 다시 뽑기 버튼 클릭 핸들러
       * 랜딩 화면으로 돌아가 새로운 결과를 뽑을 수 있게 합니다
       */
      window._handleRetry = function () {
        currentResult = null;
        showLanding();
      };

      // ── 앱 초기화 ────────────────────────────────────────
      applyTheme();   // CSS 변수에 테마 색상 주입
      showLanding();  // 랜딩 화면 렌더링 시작

    })();
  </script>
</body>
</html>
