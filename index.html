  <script>
/* ====================================================
 * 핵심 공용 엔진 (자동 생성 - 수정하지 마세요)
 * 원본: src/core.js
 * ==================================================== */
// ============================================================
// core.js — 글로벌 수익 자판기 핵심 공용 엔진
// ============================================================
// 이 파일은 인도/인도네시아 두 스킨이 100% 공유하는 유일한 로직 레이어입니다.
// 광고 제어, 무한 랜덤 연산, WhatsApp 공유 배선을 담당합니다.
// ★ 이 파일은 수정하지 않아도 됩니다. 콘텐츠는 config-*.js에서 관리합니다.
// ============================================================

/**
 * [랜덤 선택기]
 * 배열에서 매번 다른 요소를 반환합니다.
 * 배열 크기를 늘릴수록 조합 수가 폭발적으로 증가 → "무한 랜덤성" 구현의 핵심
 *
 * @param {Array} arr - 무작위로 선택할 배열
 * @returns {*} 배열에서 랜덤하게 선택된 요소 1개
 */
function pickRandom(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

/**
 * [무한 랜덤 결과 생성기]
 * config.resultPools 객체의 각 키(luckyNumber, vedicCard 등)에 대해
 * 각각 독립적으로 랜덤 선택을 수행하여 완성된 결과 객체를 조립합니다.
 * 예: 9가지 카드 × 13가지 숫자 × 6가지 색상 = 702가지 조합
 *
 * @param {Object} config - 국가별 APP_CONFIG 설정 객체 (window.APP_CONFIG)
 * @returns {Object} 각 풀에서 선택된 값들로 구성된 결과 객체
 */
function generateRandomResult(config) {
  const result = {};
  // resultPools의 각 키-배열 쌍을 순회하며 독립 랜덤 선택
  for (const [key, pool] of Object.entries(config.resultPools)) {
    result[key] = pickRandom(pool);
  }
  return result;
}

/**
 * [광고 인터스티셜 컨트롤러]
 * 유저가 결과 보기 버튼을 누를 때 이 함수가 호출됩니다.
 * Adsterra 광고가 로드되면 → 광고 표시 → 닫힘 시 결과창 이동
 * Adsterra 광고 차단/로드실패 → 3초 폴백 타이머 후 결과창 강제 이동
 *
 * ★ 실제 Adsterra 계정 설정 방법:
 *    1. Adsterra 대시보드(adsterra.com)에서 'Pop-under' 또는 'Interstitial' 광고 코드 발급
 *    2. templates/index.html의 <!-- AD_PLACEHOLDER --> 주석을
 *       발급받은 <script> 코드 전체로 교체하면 자동 작동합니다.
 *    3. Adsterra 팝언더는 페이지 로드 후 첫 번째 유저 클릭 시 자동 발동되므로
 *       버튼 클릭이 곧 광고 트리거 시점이 됩니다.
 *
 * @param {Function} onComplete - 광고 종료 또는 3초 타임아웃 후 실행할 콜백 함수
 */
function showInterstitialAd(onComplete) {
  // 콜백이 두 번 실행되는 것을 방지하는 플래그
  let callbackFired = false;

  function fireCallback() {
    if (callbackFired) return; // 이미 실행됐으면 두 번째 호출 무시
    callbackFired = true;
    // 화면에 오버레이가 남아있으면 제거
    const overlay = document.getElementById('ad-overlay');
    if (overlay) {
      overlay.style.opacity = '0';
      overlay.style.transition = 'opacity 0.3s ease';
      setTimeout(function () { if (overlay.parentNode) overlay.remove(); }, 300);
    }
    onComplete(); // 결과창 렌더링 시작
  }

  // ── 3초 폴백 타이머 ──────────────────────────────────────
  // AdBlock 사용자, 광고 네트워크 오류, 느린 네트워크 모두 커버
  // 어떤 상황에서도 유저가 결과 화면으로 반드시 이동하도록 보장
  const fallbackTimer = setTimeout(fireCallback, 3000);

  // ── 광고 대기 오버레이 DOM 생성 ──────────────────────────
  // 유저에게 "잠깐 기다려 주세요" 피드백을 주는 반투명 풀스크린 레이어
  // 실제 Adsterra 팝언더 광고는 백그라운드 탭에서 열리므로
  // 이 오버레이가 메인 화면의 시각적 피드백을 담당합니다
  const overlay = document.createElement('div');
  overlay.id = 'ad-overlay';
  overlay.setAttribute('style', [
    'position:fixed', 'top:0', 'left:0', 'right:0', 'bottom:0',
    'z-index:9999',
    'background:rgba(0,0,0,0.80)',
    'display:flex',
    'flex-direction:column',
    'align-items:center',
    'justify-content:center',
    'backdrop-filter:blur(6px)',
    '-webkit-backdrop-filter:blur(6px)',
    'opacity:0',
    'transition:opacity 0.3s ease'
  ].join(';'));

  // 오버레이 내부 카드 (국가 스킨에 무관하게 중립적인 디자인)
  overlay.innerHTML = [
    '<div style="',
    'background:white;',
    'border-radius:24px;',
    'padding:32px 24px;',
    'max-width:320px;',
    'width:88%;',
    'text-align:center;',
    'box-shadow:0 30px 60px rgba(0,0,0,0.4);',
    '">',
    // 스피너 이모지 (JS가 애니메이션 처리)
    '<div id="ad-spinner" style="font-size:52px;margin-bottom:16px;">⏳</div>',
    '<p style="font-size:17px;font-weight:900;color:#222;margin:0 0 6px;">Please wait...</p>',
    '<p style="font-size:13px;color:#888;margin:0 0 20px;">Your result is almost ready ✨</p>',
    // 프로그레스 바 트랙
    '<div style="background:#f0f0f0;border-radius:99px;height:10px;overflow:hidden;margin-bottom:12px;">',
    '<div id="ad-progress" style="',
    'height:100%;',
    'width:0%;',
    'background:linear-gradient(90deg,#f97316,#eab308);',
    'border-radius:99px;',
    'transition:width 0.1s linear;',
    '"></div>',
    '</div>',
    // 광고 레이블
    '<p style="font-size:10px;color:#ccc;margin:0;">Sponsored · Advertisement</p>',
    // 실제 Adsterra 배너 광고를 여기에 삽입할 수도 있습니다
    '<div id="ad-banner-slot" style="margin-top:12px;min-height:60px;"></div>',
    '</div>'
  ].join('');

  document.body.appendChild(overlay);

  // 페이드인 (requestAnimationFrame으로 CSS transition 트리거)
  requestAnimationFrame(function () {
    requestAnimationFrame(function () {
      overlay.style.opacity = '1';
    });
  });

  // ── 프로그레스 바 & 스피너 애니메이션 ────────────────────
  // 3초(3000ms) 동안 0% → 100% 채우기
  let progress = 0;
  const progressEl = document.getElementById('ad-progress');
  const spinnerEl = document.getElementById('ad-spinner');
  const spinnerFrames = ['⏳', '⌛', '⏳', '⌛'];
  let spinnerIdx = 0;

  const progressInterval = setInterval(function () {
    progress += 100 / 30; // 100ms 간격 × 30회 = 3000ms
    if (progressEl) progressEl.style.width = Math.min(progress, 100) + '%';
    spinnerIdx = (spinnerIdx + 1) % spinnerFrames.length;
    if (spinnerEl) spinnerEl.textContent = spinnerFrames[spinnerIdx];
    if (progress >= 100) clearInterval(progressInterval);
  }, 100);

  // ── Adsterra 실제 광고 API 연동 (선택 사항) ───────────────
  // Adsterra 스크립트가 페이지에 로드된 경우 공식 닫힘 이벤트를 수신합니다.
  // 스크립트가 없거나 함수가 없으면 try/catch가 무시하고 fallbackTimer에 위임합니다.
  try {
    if (typeof window.__adsterra_show === 'function') {
      window.__adsterra_show({
        onClose: function () {
          clearTimeout(fallbackTimer);
          clearInterval(progressInterval);
          fireCallback();
        }
      });
    }
    // ★ Adsterra 팝언더 방식(가장 일반적):
    //   유저의 첫 클릭 이벤트에서 자동으로 백그라운드 탭이 열립니다.
    //   AD_PLACEHOLDER에 Adsterra 스크립트를 삽입하면 별도 API 호출 없이 자동 작동합니다.
  } catch (e) {
    // 광고 트리거 오류 → fallbackTimer(3초)에 위임하여 유저 이탈 방지
    console.warn('[AdManager] 광고 트리거 실패, 3초 폴백 타이머 사용 중.', e.message);
  }
}

/**
 * [WhatsApp 공유 URL 생성기]
 * 현재 도메인 URL + 국가별 현지어 바이럴 문구를 합쳐
 * WhatsApp 딥링크 URL을 만듭니다.
 *
 * @param {Object} config - 국가별 APP_CONFIG (config.getShareText 함수 필요)
 * @param {Object} result - generateRandomResult()가 반환한 결과 객체
 * @returns {string} 완성된 WhatsApp 공유 URL
 */
function generateWhatsAppShareUrl(config, result) {
  // config.getShareText(result)가 현지어 바이럴 문구를 반환
  const shareText = config.getShareText(result);
  // 현재 페이지 URL을 문구 끝에 자동 주입
  const fullText = shareText + '\n\n👉 ' + window.location.href;
  return 'https://api.whatsapp.com/send?text=' + encodeURIComponent(fullText);
}

/**
 * [WhatsApp 공유 실행기]
 * 새 탭으로 WhatsApp 공유 URL을 엽니다.
 * 모바일에서는 WhatsApp 앱이 직접 실행됩니다.
 * PC에서는 web.whatsapp.com이 열립니다.
 *
 * @param {Object} config - 국가별 APP_CONFIG
 * @param {Object} result - 현재 화면의 랜덤 결과 객체
 */
function openWhatsAppShare(config, result) {
  const url = generateWhatsAppShareUrl(config, result);
  // noopener: 새 탭에서 window.opener 접근 차단 (보안)
  // noreferrer: 리퍼러 헤더 전송 차단 (개인정보 보호)
  window.open(url, '_blank', 'noopener,noreferrer');
}

            '<span class="inline-block rounded-full px-4 py-1 text-xs font-bold" style="background:var(--accent-light);color:var(--accent)">',
            result.khodam.personalityTag,
            '</span>',
            '</div>',

            // 수호령 설명
            '<div class="rounded-2xl p-4 mb-4 text-sm leading-relaxed text-gray-700" style="background:white;border:1px solid var(--card-border)">',
            result.khodam.desc,
            '</div>',

            // K-푸드 섹션
            '<div class="rounded-2xl p-4 mb-4" style="background:white;border:1px solid var(--card-border)">',
            '<div class="text-xs font-black mb-3" style="color:var(--accent)">🍜 K-Food Hari Ini</div>',
            '<div class="flex items-start gap-3">',
            '<span class="text-3xl flex-shrink-0 select-none">', result.kFood.emoji, '</span>',
            '<div>',
            '<div class="font-black text-sm mb-1" style="color:var(--accent)">', result.kFood.name, '</div>',
            '<span class="inline-block rounded-full px-2 py-0.5 text-xs font-bold mb-1" style="background:var(--accent-light);color:var(--accent)">', result.kFood.tag, '</span>',
            '<p class="text-xs text-gray-600 leading-relaxed">', result.kFood.desc, '</p>',
            '</div>',
            '</div>',
            '</div>',

            // 행운의 이모지 콤보
            '<div class="text-center text-4xl mb-2 select-none">', result.luckyEmojiCombo, '</div>'
          ].join('');
        }

        // 결과 화면 전체 렌더링
        setApp([
          '<div class="min-h-screen flex flex-col items-center justify-start pt-8 px-5 pb-24" style="background:linear-gradient(135deg, var(--grad-from), var(--grad-via), var(--grad-to));">',

          // 결과 카드 (카드 등장 애니메이션 + 반짝임 효과)
          '<div class="w-full max-w-sm rounded-3xl p-6 shadow-2xl animate-fade-in-up card-shimmer no-scrollbar" style="background:var(--card-bg);border:1.5px solid var(--card-border);box-shadow:0 20px 50px var(--shadow-color)">',

          // 결과 타이틀
          '<h3 class="text-center font-black text-lg mb-5" style="color:var(--accent)">',
          cfg.ui.resultTitle,
          '</h3>',

          // 국가별 결과 카드 내용 (위에서 조립한 HTML)
          resultCardHtml,

          // WhatsApp 공유 버튼 (바이럴 핵심!)
          '<button onclick="window._handleShare()" class="w-full py-4 px-6 rounded-2xl font-black text-base text-white shadow-lg btn-share transition-all duration-200 mt-2" style="background:var(--btn-share, #16a34a);box-shadow:0 8px 20px rgba(22,163,74,0.35)">',
          cfg.ui.shareButton,
          '</button>',
          '<p class="text-center text-xs mt-2" style="color:var(--accent);opacity:0.65">',
          cfg.ui.shareSubtext,
          '</p>',

          // 다시 뽑기 버튼
          '<button onclick="window._handleRetry()" class="w-full py-3 px-6 rounded-2xl font-bold text-sm mt-3 btn-retry transition-all duration-200" style="background:white;border:1.5px solid var(--card-border);color:var(--accent)">',
          cfg.ui.retryButton,
          '</button>',

          '</div>', // 결과 카드 닫기

          // 스마트링크 버튼 (카드 외부 — 콘텐츠 소비 직후 클릭률 최적 위치)
          '<a href="https://www.effectivecpmnetwork.com/j89322zg?key=561457da58909f9dc25b5cba39d53876" target="_blank" rel="noopener" class="block w-full max-w-sm mt-4 py-3 px-5 rounded-2xl font-bold text-sm text-center text-white active:scale-95 transition-all duration-200" style="background:linear-gradient(135deg,#6366f1,#8b5cf6);box-shadow:0 6px 16px rgba(99,102,241,0.3)">',
          cfg.ui.smartlinkButton || '✨ Explore More Lucky Insights →',
          '</a>',

          // 네이티브 배너 컨테이너 (invoke.js가 여기에 광고를 주입)
          '<div class="w-full max-w-sm mt-4">',
          '<div id="container-885d437a9988328211937c3edeff1988"></div>',
          '</div>',

          '</div>' // 화면 닫기
        ].join(''));

        // 네이티브 배너 스크립트 레이지 로드 — 컨테이너 div 생성 후 1회만 실행
        if (!window._nativeBannerLoaded) {
          window._nativeBannerLoaded = true;
          var nbs = document.createElement('script');
          nbs.async = true;
          nbs.setAttribute('data-cfasync', 'false');
          nbs.src = 'https://pl30266861.effectivecpmnetwork.com/885d437a9988328211937c3edeff1988/invoke.js';
          document.head.appendChild(nbs);
        }

        // CSS 변수로 공유 버튼 색상 지정
        document.documentElement.style.setProperty('--btn-share', cfg.theme.buttonShare);
      }

      // ─────────────────────────────────────────────────────
      // 이벤트 핸들러 (onclick에서 window._로 글로벌 접근)
      // ─────────────────────────────────────────────────────

      /**
       * CTA 버튼 클릭 핸들러
       * 광고 오버레이 → 3초 후 자동으로 결과 화면으로 이동
       */
      window._handleCTAClick = function () {
        showAdWaiting(); // 대기 화면 표시 (즉시 반응 = UX 퀄리티)
        showInterstitialAd(function () {
          // 광고 완료 or 3초 폴백 후 실행
          var result = generateRandomResult(cfg);
          currentResult = result;
          showResult(result);
        });
      };

      /**
       * WhatsApp 공유 버튼 클릭 핸들러
       * 현재 결과를 현지어 바이럴 문구와 함께 WhatsApp으로 공유
       */
      window._handleShare = function () {
        if (currentResult) {
          openWhatsAppShare(cfg, currentResult);
        }
      };

      /**
       * 다시 뽑기 버튼 클릭 핸들러
       * 랜딩 화면으로 돌아가 새로운 결과를 뽑을 수 있게 합니다
       */
      window._handleRetry = function () {
        currentResult = null;
        showLanding();
      };

      // ── 앱 초기화 ────────────────────────────────────────
      applyTheme();   // CSS 변수에 테마 색상 주입
      showLanding();  // 랜딩 화면 렌더링 시작

    })();
  </script>
